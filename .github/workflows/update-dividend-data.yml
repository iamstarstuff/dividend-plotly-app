name: Update Dividend Data

on:
  schedule:
    # Run daily at 06:00 UTC (after US market close + buffer)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas yfinance requests lxml html5lib

      - name: Run dividend data update
        working-directory: src
        run: python -m update_scripts.index_dividend_fetcher

      - name: Check for changes
        id: check
        run: |
          git diff --quiet src/data/index_dividend_data.csv && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push updated data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/index_dividend_data.csv
          git commit -m "📊 Auto-update dividend data $(date -u +%Y-%m-%d)"
          git push
